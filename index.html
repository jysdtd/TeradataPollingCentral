<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teradata Polling Central</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--cd:#1a2236;--ac:#0ea5e9;--al:#38bdf8;--gn:#10b981;--or:#f59e0b;--tx:#f1f5f9;--mt:#94a3b8;--bd:#1e293b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.wrap{max-width:480px;width:100%;text-align:center}
h1{font-size:36px;font-weight:700;margin-bottom:8px}h1 span{color:var(--ac)}
.sub{color:var(--mt);font-size:14px;margin-bottom:32px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);margin-bottom:24px}
.badge .dot{width:8px;height:8px;border-radius:50%;background:var(--gn);box-shadow:0 0 6px var(--gn)}
.badge span{color:var(--or);font-size:11px;font-weight:600}
.card{background:var(--cd);border-radius:16px;padding:28px;border:1px solid var(--bd);margin-bottom:16px}
.card h3{font-size:18px;margin-bottom:6px}.card p{color:var(--mt);font-size:13px}
</style></head><body>
<div class="wrap">
  <div style="font-size:56px;margin-bottom:8px">📊</div>
  <h1>Live<span>Poll</span></h1>
  <p class="sub">Teradata Polling Central</p>
  <div class="badge"><div class="dot"></div><span>Powered by Teradata</span></div>
  <div class="card">
    <h3>Looking for a session?</h3>
    <p>Ask your presenter for the session link and code to join a live poll.</p>
  </div>
</div>
</body></html>
