<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>LivePoll Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0b0f1a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{max-width:420px;width:100%}
.card{background:#1a2236;border-radius:16px;padding:28px;border:1px solid #1e293b}
.hdr{text-align:center;margin-bottom:24px}
.hdr .icon{font-size:48px;margin-bottom:8px}
.hdr h1{font-size:28px;font-weight:700}.hdr h1 span{color:#0ea5e9}
.hdr p{color:#94a3b8;font-size:13px;margin-top:6px}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:#94a3b8;margin-bottom:6px;display:block}
.inp{width:100%;padding:13px 16px;border-radius:10px;border:1px solid #1e293b;background:#111827;color:#f1f5f9;font-size:14px;font-family:'Outfit',sans-serif;outline:none}
.inp:focus{border-color:#0ea5e9}
.inp::placeholder{color:#475569}
.field{margin-bottom:14px}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;box-shadow:0 4px 16px rgba(14,165,233,.25)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:#f43f5e;font-size:13px;text-align:center;margin:10px 0;display:none}
.ok{text-align:center;padding:40px 20px}
.ok .big{font-size:56px;margin-bottom:12px}
.ok h2{font-size:22px;margin-bottom:8px;color:#10b981}
.ok p{color:#94a3b8;font-size:13px;line-height:1.5}
.ok .rid{margin:16px 0;padding:14px;background:#111827;border-radius:10px;font-family:monospace;font-size:14px;color:#38bdf8;border:1px solid #1e293b;text-align:center;letter-spacing:1px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);margin-top:12px}
.badge span{color:#f59e0b;font-size:11px;font-weight:600}
.badge .dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981}
.pw{text-align:center;margin-top:16px;color:#475569;font-size:11px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var GH_OWNER="jysdtd",GH_REPO="TeradataPollingCentral",GH_BRANCH="main";
var _a="J6IoAbezSNDLPN4SsUqKfOGFISdIAM",_b="RjcbXAlAmblkVIUi0TZohta9iv8Ub_",_c="O5dMvhFjamPM0QL2IAMB11_tap_buhtig";
function gt(){return(_a+_b+_c).split("").reverse().join("")}

function showForm(){
  document.getElementById("app").innerHTML=
    '<div class="card"><div class="hdr"><div class="icon">\ud83d\udcdd</div><h1>Live<span>Poll</span></h1><p>Participant Registration</p><div class="badge"><span class="dot"></span><span>Teradata</span></div></div>'+
    '<div class="field"><label class="lbl">Full Name *</label><input class="inp" id="n" placeholder="Your full name"></div>'+
    '<div class="field"><label class="lbl">Email Address *</label><input class="inp" id="e" placeholder="you@company.com" type="email"></div>'+
    '<div class="field"><label class="lbl">Company</label><input class="inp" id="c" placeholder="Your company"></div>'+
    '<div class="field"><label class="lbl">Role / Title</label><input class="inp" id="r" placeholder="e.g. Data Engineer"></div>'+
    '<div class="err" id="err"></div>'+
    '<button class="btn" id="btn" onclick="go()">Register \u2192</button></div><p class="pw">Powered by LivePoll \xb7 Teradata</p>';
}

function go(){
  var n=document.getElementById("n").value.trim();
  var e=document.getElementById("e").value.trim();
  var c=document.getElementById("c").value.trim();
  var r=document.getElementById("r").value.trim();
  var err=document.getElementById("err");
  var btn=document.getElementById("btn");
  err.style.display="none";
  if(!n){err.textContent="Name is required.";err.style.display="block";return}
  if(!e||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){err.textContent="Valid email required.";err.style.display="block";return}
  btn.disabled=true;
  var rid="REG-"+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,6).toUpperCase();
  var data={regId:rid,name:n,email:e,company:c,role:r,registeredAt:new Date().toISOString()};
  var path="registrations/"+rid+".json";
  var body=JSON.stringify({message:"LivePoll registration: "+n,content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),branch:GH_BRANCH});
  // Fire and forget - no await, no .then, just send it
  try{
    var x=new XMLHttpRequest();
    x.open("PUT","https://api.github.com/repos/"+GH_OWNER+"/"+GH_REPO+"/contents/"+path,true);
    x.setRequestHeader("Authorization","token "+gt());
    x.setRequestHeader("Content-Type","application/json");
    x.setRequestHeader("Accept","application/vnd.github.v3+json");
    x.send(body);
  }catch(ex){}
  // Show success immediately
  document.getElementById("app").innerHTML=
    '<div class="card ok"><div class="big">\u2705</div><h2>You\'re Registered!</h2>'+
    '<p>Thanks, <strong>'+n+'</strong>'+(c?" from "+c:"")+'.</p>'+
    '<p style="color:#94a3b8;font-size:13px;margin-top:12px">Your presenter will have your details ready for the session.</p>'+
    '<button class="btn" style="margin-top:20px;background:#1a2236;border:1px solid #1e293b;box-shadow:none" onclick="showForm()">Register Another</button>'+
    '</div><p class="pw">Powered by LivePoll \xb7 Teradata</p>';
}

showForm();
</script>
</body>
</html>
